<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reserva de Sala de Reuniones</title>
<style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f5f5f5;margin:20px;}
    h1{color:#2c3e50;text-align:center;}
    .container{max-width:960px;margin:auto;background:#fff;padding:20px;
               border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);}
    .controls{margin-bottom:15px;text-align:center;}
    label{display:block;margin-top:8px;font-weight:bold;}
    input{width:100%;padding:8px;margin-top:4px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;}
    button{margin:5px;padding:10px 18px;background:#27ae60;color:#fff;
           border:none;border-radius:4px;cursor:pointer;}
    button:hover{background:#2ecc71;}
    button.secondary{background:#95a5a6;}
    button.secondary:hover{background:#bdc3c7;}
    button.danger{background:#e74c3c;}
    button.danger:hover{background:#c0392b;}
    #calendar{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;margin-top:10px;}
    .time-header,.day-header{background:#ecf0f1;font-weight:bold;
                             text-align:center;padding:6px 2px;border-radius:4px;font-size:.85em;}
    .slot{height:36px;line-height:1.2;padding:2px 4px;font-size:.78em;
          cursor:pointer;border-radius:3px;user-select:none;display:flex;align-items:center;justify-content:center;text-align:center;}
    .slot.avail{background:#e8f8f5;}
    .slot.avail:hover{background:#a9dfbf;}
    .slot.inicio{background:#f39c12;color:#fff;}
    .slot.selected{background:#2ecc71;color:#fff;}
    .slot.taken{background:#fadbd8;color:#c0392b;cursor:pointer;}
    #info{margin-top:15px;padding:10px;background:#f9f9f9;border-left:4px solid #27ae60;min-height:40px;}
    #instruccion{background:#eaf4fb;border-left:4px solid #3498db;padding:8px 12px;
                 margin-bottom:10px;border-radius:4px;font-size:.9em;color:#2c3e50;}
    .modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;
           overflow:auto;background-color:rgba(0,0,0,0.5);}
    .modal-content{background:#fff;margin:10% auto;padding:25px;border-radius:8px;
                   width:90%;max-width:420px;position:relative;}
    .modal-title{margin:0 0 20px;font-size:1.3em;color:#2c3e50;}
    .close{color:#aaa;float:right;font-size:26px;font-weight:bold;cursor:pointer;}
    .close:hover{color:#000;}
    .form-group{margin-bottom:14px;}
    .form-group label{margin-bottom:4px;font-size:.9em;display:block;font-weight:bold;}
    .form-group input{font-size:.95em;}
    .modal-btns{display:flex;gap:8px;margin-top:18px;}
    .modal-btns button{flex:1;}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff;
             border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;
             vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="container">
    <h1>📅 Reserva de Sala de Reuniones</h1>
    <div class="controls">
        <label>Fecha de la semana:
            <input type="date" id="semanaInput">
        </label>
        <label>Nombre / Asunto de la reserva:
            <input type="text" id="nombreReserva" placeholder="Ej. Reunión de proyecto">
        </label>
        <button id="btnVerCal">Mostrar calendario</button>
        <button id="btnReservar" class="secondary" disabled>Reservar selección</button>
        <button id="btnCancelarSel" class="secondary" style="display:none">❌ Cancelar selección</button>
    </div>
    <div id="instruccion" style="display:none">
        👉 <strong>Paso 1:</strong> Haga clic en el horario de <strong>inicio</strong>.
        Luego <strong>Paso 2:</strong> Haga clic en el horario de <strong>fin</strong> (puede ser el mismo para 30 min).
    </div>
    <div id="calendar"></div>
    <div id="info">Seleccione una fecha y haga clic en "Mostrar calendario".</div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModal">&times;</span>
        <h2 class="modal-title">✏️ Editar Reserva</h2>
        <form id="editForm">
            <div class="form-group">
                <label for="editNombre">Nombre / Asunto:</label>
                <input type="text" id="editNombre" required>
            </div>
            <div class="form-group">
                <label for="editFecha">Fecha:</label>
                <input type="date" id="editFecha" required>
            </div>
            <div class="form-group">
                <label for="editHoraInicio">Hora inicio:</label>
                <input type="time" id="editHoraInicio" required>
            </div>
            <div class="form-group">
                <label for="editHoraFin">Hora fin:</label>
                <input type="time" id="editHoraFin" required>
            </div>
            <div class="modal-btns">
                <button type="submit" id="btnGuardarEdicion">💾 Guardar</button>
                <button type="button" id="btnEliminar" class="danger">🗑️ Eliminar</button>
                <button type="button" id="cancelEdit" class="secondary">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxw-ft1VZ4H-udfqkzNQTlmUhdQqd2c5COP2O_HfPwwryo6HieEzPUM2II1JBJiNUg/exec';
const DIAS      = ['Lun','Mar','Mié','Jue','Vie'];
const HORA_INI  = 8;
const HORA_FIN  = 17;
const INTERVALO = 30;

let reservas = [], reservaEnEdicion = null;
let slotInicio = null;  // {fecha, hora, elem}
let slotFin    = null;  // {fecha, hora, elem}

function pad(n){ return n<10?'0'+n:n; }
function sumarMinutos(hhmm,mins){
    const [h,m]=hhmm.split(':').map(Number);
    let t=((h*60+m+mins)%1440+1440)%1440;
    return `${pad(Math.floor(t/60))}:${pad(t%60)}`;
}
function generarHoras(){
    const out=[];
    for(let h=HORA_INI;h<=HORA_FIN;h++)
        for(let m=0;m<60;m+=INTERVALO)
            out.push(`${pad(h)}:${pad(m)}`);
    return out;
}
const HORAS=generarHoras();
function setInfo(msg){ document.getElementById('info').textContent=msg; }

async function apiCall(params){
    const url=WEB_APP_URL+'?'+new URLSearchParams(params).toString();
    const r=await fetch(url);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
}

async function cargarReservas(){
    setInfo('⏳ Cargando reservas...');
    try{
        reservas=await apiCall({action:'listar'});
        const fecha=document.getElementById('semanaInput').value;
        if(fecha) renderCalendario(fecha);
        setInfo(`${reservas.length} reserva(s). Ingrese un nombre y haga clic en el horario de inicio para comenzar a reservar.`);
        document.getElementById('instruccion').style.display='block';
    }catch(e){ setInfo('❌ Error al cargar: '+e.message); }
}

function renderCalendario(fechaISO){
    const cont=document.getElementById('calendar');
    cont.innerHTML='';
    const h0=document.createElement('div');
    h0.className='time-header'; h0.textContent='Hora / Día';
    cont.appendChild(h0);

    const base=new Date(fechaISO+'T12:00:00');
    const lunes=new Date(base);
    lunes.setDate(base.getDate()-((base.getDay()+6)%7));

    DIAS.forEach((dia,i)=>{
        const d=new Date(lunes); d.setDate(lunes.getDate()+i);
        const th=document.createElement('div');
        th.className='day-header';
        th.textContent=`${dia} ${d.getDate()}/${d.getMonth()+1}`;
        cont.appendChild(th);
    });

    HORAS.forEach(hora=>{
        const ch=document.createElement('div');
        ch.className='time-header'; ch.textContent=hora;
        cont.appendChild(ch);
        DIAS.forEach((_,i)=>{
            const d=new Date(lunes); d.setDate(lunes.getDate()+i);
            const fs=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
            const rx=reservas.find(r=>{
                const ini=new Date(`${r.fecha}T${r.horaInicio}:00`);
                const fin=new Date(`${r.fecha}T${r.horaFin}:00`);
                const slot=new Date(`${fs}T${hora}:00`);
                return slot>=ini && slot<fin;
            });
            const celda=document.createElement('div');
            celda.dataset.fecha=fs;
            celda.dataset.hora=hora;
            if(rx){
                celda.className='slot taken';
                celda.title=`Clic para editar: ${rx.nombre}`;
                celda.innerHTML=`<span style="font-size:.75em">${rx.nombre}<br>${rx.horaInicio}-${rx.horaFin}</span>`;
                celda.addEventListener('click',()=>abrirModal(rx.id));
            }else{
                celda.className='slot avail';
                celda.addEventListener('click',()=>clicSlotLibre(celda,fs,hora));
            }
            cont.appendChild(celda);
        });
    });
}

/* ---- Lógica de selección de rango ---- */
function clicSlotLibre(elem, fecha, hora){
    // Si no hay inicio seleccionado aún → marcar como INICIO
    if(!slotInicio){
        slotInicio={fecha,hora,elem};
        elem.classList.add('inicio');
        setInfo(`⏱️ Inicio: ${fecha} ${hora}. Ahora haga clic en el horario de FIN (puede ser el mismo slot para 30 min).`);
        document.getElementById('instruccion').innerHTML=
            '👉 <strong>Paso 2:</strong> Haga clic en el horario de <strong>fin</strong> de la reserva.';
        return;
    }

    // Debe ser el mismo día
    if(elem.dataset.fecha !== slotInicio.fecha){
        alert('El inicio y fin deben ser el mismo día.');
        return;
    }

    // La hora fin debe ser >= inicio
    if(hora < slotInicio.hora){
        alert('La hora de fin no puede ser anterior al inicio.');
        return;
    }

    slotFin={fecha,hora,elem};
    const horaFinReal=sumarMinutos(hora,INTERVALO);

    // Verificar que ningún slot intermedio esté ocupado
    const idx1=HORAS.indexOf(slotInicio.hora);
    const idx2=HORAS.indexOf(hora);
    for(let i=idx1;i<=idx2;i++){
        const h=HORAS[i];
        const ocupado=reservas.some(r=>{
            const ini=new Date(`${slotInicio.fecha}T${r.horaInicio}:00`);
            const fin=new Date(`${slotInicio.fecha}T${r.horaFin}:00`);
            const slot=new Date(`${slotInicio.fecha}T${h}:00`);
            return slot>=ini && slot<fin;
        });
        if(ocupado){
            alert(`El slot ${h} ya está ocupado dentro del rango seleccionado. Por favor elija un rango libre.`);
            cancelarSeleccion();
            return;
        }
    }

    // Pintar todos los slots del rango en verde
    limpiarSeleccion();
    const nombre=document.getElementById('nombreReserva').value.trim()||'Sin nombre';
    for(let i=idx1;i<=idx2;i++){
        const h=HORAS[i];
        const celda=document.querySelector(`.slot[data-fecha="${slotInicio.fecha}"][data-hora="${h}"]`);
        if(celda) celda.classList.add('selected');
    }

    setInfo(`✅ Selección: "${nombre}" — ${slotInicio.fecha} ${slotInicio.hora} – ${horaFinReal}. Presione "Reservar selección" para confirmar.`);
    document.getElementById('btnReservar').disabled=false;
    document.getElementById('btnCancelarSel').style.display='';
    document.getElementById('instruccion').innerHTML=
        '✅ Rango seleccionado. Presione <strong>"Reservar selección"</strong> o haga clic en otro slot para cambiar.';
}

function limpiarSeleccion(){
    document.querySelectorAll('.slot.selected,.slot.inicio').forEach(el=>{
        el.classList.remove('selected','inicio');
    });
}

function cancelarSeleccion(){
    limpiarSeleccion();
    slotInicio=null; slotFin=null;
    document.getElementById('btnReservar').disabled=true;
    document.getElementById('btnCancelarSel').style.display='none';
    document.getElementById('instruccion').innerHTML=
        '👉 <strong>Paso 1:</strong> Haga clic en el horario de <strong>inicio</strong>. Luego <strong>Paso 2:</strong> Haga clic en el horario de <strong>fin</strong>.';
    setInfo('Selección cancelada. Vuelva a hacer clic en un horario de inicio.');
}

async function guardarReserva(){
    if(!slotInicio||!slotFin) return;
    const nombre=document.getElementById('nombreReserva').value.trim()||'Sin nombre';
    const horaFinReal=sumarMinutos(slotFin.hora,INTERVALO);
    const btn=document.getElementById('btnReservar');
    btn.innerHTML='<span class="spinner"></span>Guardando…'; btn.disabled=true;
    try{
        const res=await apiCall({
            action:'crear', nombre,
            fecha:slotInicio.fecha,
            horaInicio:slotInicio.hora,
            horaFin:horaFinReal
        });
        if(!res.success) throw new Error(res.error);
        alert('✅ Reserva guardada.');
        slotInicio=null; slotFin=null;
        document.getElementById('nombreReserva').value='';
        document.getElementById('btnCancelarSel').style.display='none';
        await cargarReservas();
    }catch(e){
        alert('❌ Error al guardar: '+e.message);
        btn.disabled=false;
    }finally{ btn.innerHTML='Reservar selección'; }
}

function abrirModal(reservaId){
    const r=reservas.find(x=>x.id==reservaId);
    if(!r){ alert('No encontrada'); return; }
    reservaEnEdicion=r;
    document.getElementById('editNombre').value=r.nombre;
    document.getElementById('editFecha').value=r.fecha;
    document.getElementById('editHoraInicio').value=r.horaInicio;
    document.getElementById('editHoraFin').value=r.horaFin;
    document.getElementById('editModal').style.display='block';
}
function cerrarModal(){
    document.getElementById('editModal').style.display='none';
    reservaEnEdicion=null;
    document.getElementById('editForm').reset();
}

async function guardarEdicion(){
    if(!reservaEnEdicion) return;
    const nombre=document.getElementById('editNombre').value.trim();
    const fecha=document.getElementById('editFecha').value;
    const horaInicio=document.getElementById('editHoraInicio').value;
    const horaFin=document.getElementById('editHoraFin').value;
    if(!nombre||!fecha||!horaInicio||!horaFin){ alert('Complete todos los campos'); return; }
    const btn=document.getElementById('btnGuardarEdicion');
    btn.innerHTML='<span class="spinner"></span>Guardando…'; btn.disabled=true;
    try{
        const res=await apiCall({action:'editar',id:reservaEnEdicion.id,nombre,fecha,horaInicio,horaFin});
        if(!res.success) throw new Error(res.error);
        alert('✅ Actualizada.'); cerrarModal(); await cargarReservas();
    }catch(e){ alert('❌ Error: '+e.message); }
    finally{ btn.innerHTML='💾 Guardar'; btn.disabled=false; }
}

async function eliminarReserva(){
    if(!reservaEnEdicion) return;
    if(!confirm(`¿Eliminar "${reservaEnEdicion.nombre}"?`)) return;
    const btn=document.getElementById('btnEliminar');
    btn.innerHTML='<span class="spinner"></span>Eliminando…'; btn.disabled=true;
    try{
        const res=await apiCall({action:'eliminar',id:reservaEnEdicion.id});
        if(!res.success) throw new Error(res.error);
        alert('✅ Eliminada.'); cerrarModal(); await cargarReservas();
    }catch(e){ alert('❌ Error: '+e.message); }
    finally{ btn.innerHTML='🗑️ Eliminar'; btn.disabled=false; }
}

document.getElementById('btnVerCal').addEventListener('click',()=>{
    const fecha=document.getElementById('semanaInput').value;
    if(!fecha){ alert('Seleccione una fecha'); return; }
    cancelarSeleccion();
    cargarReservas();
});
document.getElementById('btnReservar').addEventListener('click',guardarReserva);
document.getElementById('btnCancelarSel').addEventListener('click',cancelarSeleccion);
document.getElementById('editForm').addEventListener('submit',e=>{ e.preventDefault(); guardarEdicion(); });
document.getElementById('btnEliminar').addEventListener('click',eliminarReserva);
document.getElementById('closeModal').addEventListener('click',cerrarModal);
document.getElementById('cancelEdit').addEventListener('click',cerrarModal);
window.addEventListener('click',e=>{ if(e.target===document.getElementById('editModal')) cerrarModal(); });

const hoy=new Date().toISOString().split('T')[0];
document.getElementById('semanaInput').min=hoy;
document.getElementById('semanaInput').value=hoy;
</script>
</body>
</html>
