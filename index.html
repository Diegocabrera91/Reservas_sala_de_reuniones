<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reserva de Sala de Reuniones</title>
<style>
    *{box-sizing:border-box;}
    body{font-family:Arial,Helvetica,sans-serif;background:#f0f4f8;margin:0;padding:16px;}
    h1{color:#2c3e50;text-align:center;margin-bottom:16px;font-size:1.4em;}
    .container{max-width:1000px;margin:auto;background:#fff;padding:20px;
               border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.12);}
    .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:12px;}
    .ctrl-group{display:flex;flex-direction:column;flex:1;min-width:160px;}
    .ctrl-group label{font-weight:bold;margin-bottom:4px;font-size:.88em;color:#555;}
    input[type=date],input[type=text]{padding:8px 10px;border:1px solid #ccc;border-radius:6px;width:100%;font-size:.93em;}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
    button{padding:9px 16px;border:none;border-radius:6px;cursor:pointer;font-size:.88em;font-weight:bold;transition:opacity .2s;}
    button:hover{opacity:.85;}
    button.verde{background:#27ae60;color:#fff;}
    button.gris{background:#95a5a6;color:#fff;}
    button.rojo{background:#e74c3c;color:#fff;}
    button:disabled{opacity:.5;cursor:not-allowed;}
    #calendar{display:grid;grid-template-columns:64px repeat(5,1fr);gap:3px;margin-top:8px;}
    .time-header{background:#dfe6e9;font-size:.78em;font-weight:bold;text-align:center;
                 padding:6px 2px;border-radius:5px;color:#636e72;
                 display:flex;align-items:center;justify-content:center;}
    .day-header{background:#2c3e50;color:#fff;font-size:.82em;font-weight:bold;
                text-align:center;padding:8px 2px;border-radius:5px;
                display:flex;align-items:center;justify-content:center;}
    .slot{min-height:46px;padding:4px;border-radius:5px;cursor:pointer;user-select:none;
          display:flex;flex-direction:column;align-items:center;justify-content:center;
          text-align:center;font-size:.76em;line-height:1.3;transition:filter .15s;}
    .slot:hover{filter:brightness(.92);}
    .slot.avail{background:#eafaf1;border:1px solid #a9dfbf;color:#aaa;}
    .slot.inicio{background:#e67e22;border:2px solid #d35400;color:#fff;font-weight:bold;}
    .slot.selected{background:#27ae60;border:2px solid #1e8449;color:#fff;font-weight:bold;}
    .slot.taken{background:#e74c3c;border:1px solid #c0392b;color:#fff;cursor:pointer;overflow:hidden;}
    .slot.taken .t-nombre{font-weight:bold;font-size:.84em;white-space:nowrap;overflow:hidden;
                          text-overflow:ellipsis;max-width:98%;display:block;}
    .slot.taken .t-hora{font-size:.72em;opacity:.9;display:block;}
    .slot.taken.cont{background:#c0392b;}
    .slot.taken.cont .t-nombre{font-weight:normal;font-size:.76em;opacity:.85;}
    #instruccion{background:#eaf4fb;border-left:4px solid #3498db;
                 padding:8px 14px;margin:8px 0;border-radius:6px;font-size:.88em;color:#2c3e50;}
    #info{margin-top:12px;padding:10px 14px;background:#f8f9fa;border-left:4px solid #27ae60;
          border-radius:6px;font-size:.9em;min-height:36px;color:#2d3436;}
    .modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;
           overflow:auto;background:rgba(0,0,0,.5);}
    .modal-content{background:#fff;margin:6% auto;padding:26px;border-radius:10px;width:93%;max-width:440px;}
    .modal-title{margin:0 0 16px;font-size:1.15em;color:#2c3e50;}
    .close{color:#aaa;float:right;font-size:26px;font-weight:bold;cursor:pointer;line-height:1;}
    .close:hover{color:#000;}
    .form-group{margin-bottom:12px;}
    .form-group label{display:block;margin-bottom:4px;font-size:.88em;font-weight:bold;color:#555;}
    .form-group input{width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;font-size:.93em;}
    .form-row{display:flex;gap:10px;}
    .form-row .form-group{flex:1;}
    .modal-btns{display:flex;gap:8px;margin-top:16px;}
    .modal-btns button{flex:1;padding:10px;}
    .spinner{display:inline-block;width:13px;height:13px;border:2px solid #fff;
             border-top-color:transparent;border-radius:50%;
             animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px;}
    @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="container">
    <h1>📅 Reserva de Sala de Reuniones</h1>
    <div class="controls">
        <div class="ctrl-group">
            <label for="semanaInput">Semana:</label>
            <input type="date" id="semanaInput">
        </div>
        <div class="ctrl-group">
            <label for="nombreReserva">Nombre / Asunto:</label>
            <input type="text" id="nombreReserva" placeholder="Ej. Reunión de proyecto">
        </div>
        <div style="display:flex;gap:6px;align-items:flex-end;padding-bottom:1px;">
            <button class="verde" id="btnVerCal">🔄 Cambiar semana</button>
        </div>
    </div>
    <div class="btn-row">
        <button class="verde" id="btnReservar" disabled>✅ Reservar selección</button>
        <button class="gris" id="btnCancelarSel" style="display:none">❌ Cancelar</button>
    </div>
    <div id="instruccion">
        👉 <strong>Paso 1:</strong> Escriba el nombre y haga clic en el horario de <strong>inicio</strong> (🟠).
        Luego <strong>Paso 2:</strong> clic en el horario de <strong>fin</strong> (🟢).
    </div>
    <div id="calendar"></div>
    <div id="info">Cargando calendario...</div>
</div>

<!-- Modal Editar -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModal">&times;</span>
        <h2 class="modal-title">✏️ Editar Reserva</h2>
        <form id="editForm">
            <div class="form-group">
                <label>Nombre / Asunto:</label>
                <input type="text" id="editNombre" required>
            </div>
            <div class="form-group">
                <label>Fecha:</label>
                <input type="date" id="editFecha" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Hora inicio:</label>
                    <input type="time" id="editHoraInicio" required>
                </div>
                <div class="form-group">
                    <label>Hora fin:</label>
                    <input type="time" id="editHoraFin" required>
                </div>
            </div>
            <div id="editResumen" style="background:#eafaf1;border-left:3px solid #27ae60;
                 padding:6px 10px;border-radius:5px;font-size:.85em;margin-bottom:8px;display:none;"></div>
            <div class="modal-btns">
                <button type="submit" class="verde" id="btnGuardarEdicion">💾 Guardar cambios</button>
                <button type="button" class="rojo" id="btnEliminar">🗑️ Eliminar</button>
                <button type="button" class="gris" id="cancelEdit">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script>
const WEB_APP_URL='https://script.google.com/macros/s/AKfycbxw-ft1VZ4H-udfqkzNQTlmUhdQqd2c5COP2O_HfPwwryo6HieEzPUM2II1JBJiNUg/exec';
const DIAS=['Lun','Mar','Mié','Jue','Vie'];
const HORA_INI=8, HORA_FIN=17, INTERVALO=30;

let reservas=[], reservaEnEdicion=null;
let slotInicio=null, slotFin=null;

function pad(n){return n<10?'0'+n:n;}
function sumarMinutos(hhmm,mins){
    const [h,m]=hhmm.split(':').map(Number);
    let t=((h*60+m+mins)%1440+1440)%1440;
    return `${pad(Math.floor(t/60))}:${pad(t%60)}`;
}
function generarHoras(){
    const out=[];
    for(let h=HORA_INI;h<=HORA_FIN;h++)
        for(let m=0;m<60;m+=INTERVALO) out.push(`${pad(h)}:${pad(m)}`);
    return out;
}
const HORAS=generarHoras();
function setInfo(msg){document.getElementById('info').textContent=msg;}

/*
  NORMALIZACION DEFINITIVA
  Fecha viene como: "2026-03-30T03:00:00.000Z"  -> extraer YYYY-MM-DD en UTC
  Hora viene como:  "1899-12-30T20:42:45.000Z"  -> extraer HH:MM en UTC
  Apps Script serializa las horas de Sheets como fechas 1899-12-30 + fraccion del dia en UTC.
  La hora UTC del string ES la hora real que escribio el usuario.
*/
function normFecha(v){
    if(!v) return '';
    const s=String(v).trim();
    // ISO con T: extraer parte de fecha en UTC
    const mISO=s.match(/^(\d{4})-(\d{2})-(\d{2})T/);
    if(mISO) return `${mISO[1]}-${mISO[2]}-${mISO[3]}`;
    // YYYY-MM-DD simple
    if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    // DD/MM/YYYY
    const m1=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(m1) return `${m1[3]}-${pad(m1[2])}-${pad(m1[1])}`;
    // fallback: Date constructor UTC
    const d=new Date(s);
    if(!isNaN(d)) return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`;
    return s.substring(0,10);
}
function normHora(v){
    if(v===null||v===undefined||v==='') return '';
    // numero decimal (fraccion del dia)
    if(typeof v==='number'){
        const total=Math.round(v*24*60);
        return `${pad(Math.floor(total/60))}:${pad(total%60)}`;
    }
    const s=String(v).trim();
    // ISO con T: extraer HH:MM en UTC (la hora real guardada esta en UTC)
    const mISO=s.match(/T(\d{2}):(\d{2})/);
    if(mISO) return `${mISO[1]}:${mISO[2]}`;
    // HH:MM o HH:MM:SS
    const m=s.match(/^(\d{1,2}):(\d{2})/);
    if(m) return `${pad(parseInt(m[1]))}:${m[2]}`;
    return s.substring(0,5);
}

async function apiCall(params){
    const r=await fetch(WEB_APP_URL+'?'+new URLSearchParams(params));
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
}

async function cargarReservas(){
    setInfo('⏳ Cargando reservas...');
    try{
        const raw=await apiCall({action:'listar'});
        reservas=raw.map(r=>({
            ...r,
            nombre    : String(r.nombre||'').trim(),
            fecha     : normFecha(r.fecha),
            horaInicio: normHora(r.horaInicio),
            horaFin   : normHora(r.horaFin)
        })).filter(r=>r.nombre&&r.fecha&&r.horaInicio&&r.horaFin);
        renderCalendario(document.getElementById('semanaInput').value);
        setInfo(`${reservas.length} reserva(s). Ingrese nombre, clic en inicio → fin y confirme.`);
    }catch(e){setInfo('❌ Error al cargar: '+e.message);}
}

function toMin(hhmm){
    const [h,m]=String(hhmm).split(':').map(Number);
    return h*60+m;
}
function reservaDelSlot(fs,hora){
    return reservas.find(r=>{
        if(r.fecha!==fs) return false;
        const sm=toMin(hora);
        return sm>=toMin(r.horaInicio)&&sm<toMin(r.horaFin);
    });
}

function renderCalendario(fechaISO){
    const cont=document.getElementById('calendar');
    cont.innerHTML='';
    const h0=document.createElement('div');
    h0.className='time-header'; h0.textContent='Hora';
    cont.appendChild(h0);
    const base=new Date(fechaISO+'T12:00:00');
    const lunes=new Date(base);
    lunes.setDate(base.getDate()-((base.getDay()+6)%7));
    DIAS.forEach((dia,i)=>{
        const d=new Date(lunes); d.setDate(lunes.getDate()+i);
        const th=document.createElement('div');
        th.className='day-header';
        th.textContent=`${dia} ${d.getDate()}/${d.getMonth()+1}`;
        cont.appendChild(th);
    });
    HORAS.forEach(hora=>{
        const ch=document.createElement('div');
        ch.className='time-header'; ch.textContent=hora;
        cont.appendChild(ch);
        DIAS.forEach((_,i)=>{
            const d=new Date(lunes); d.setDate(lunes.getDate()+i);
            const fs=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
            const rx=reservaDelSlot(fs,hora);
            const celda=document.createElement('div');
            celda.dataset.fecha=fs;
            celda.dataset.hora=hora;
            if(rx){
                const esInicio=(rx.horaInicio===hora);
                celda.className=esInicio?'slot taken':'slot taken cont';
                celda.title=`${rx.nombre}\n${rx.horaInicio}–${rx.horaFin}\nClic para editar`;
                celda.innerHTML=esInicio
                    ?`<span class="t-nombre">${rx.nombre}</span><span class="t-hora">${rx.horaInicio}–${rx.horaFin}</span>`
                    :`<span class="t-nombre">${rx.nombre}</span>`;
                celda.addEventListener('click',()=>abrirModal(rx.id));
            }else{
                celda.className='slot avail';
                celda.addEventListener('click',()=>clicSlotLibre(celda,fs,hora));
            }
            cont.appendChild(celda);
        });
    });
}

/* ---- Selección de rango ---- */
function clicSlotLibre(elem,fecha,hora){
    if(!slotInicio){
        slotInicio={fecha,hora};
        elem.classList.remove('avail'); elem.classList.add('inicio');
        elem.innerHTML=`<span style="font-size:.82em">🟠 Inicio</span><span style="font-size:.78em">${hora}</span>`;
        setInfo(`Inicio: ${fecha} ${hora}. Ahora clic en el horario de FIN.`);
        document.getElementById('instruccion').innerHTML='👉 <strong>Paso 2:</strong> Haga clic en el horario de <strong>fin</strong>.';
        return;
    }
    if(fecha!==slotInicio.fecha){alert('Inicio y fin deben ser el mismo día.');return;}
    if(hora<slotInicio.hora){alert('La hora fin no puede ser anterior al inicio.');return;}
    slotFin={fecha,hora};
    const horaFinReal=sumarMinutos(hora,INTERVALO);
    const idx1=HORAS.indexOf(slotInicio.hora);
    const idx2=HORAS.indexOf(hora);
    for(let i=idx1;i<=idx2;i++){
        if(reservaDelSlot(fecha,HORAS[i])){
            alert(`El slot ${HORAS[i]} está ocupado.`);
            cancelarSeleccion(); return;
        }
    }
    limpiarMarcas();
    const nombre=document.getElementById('nombreReserva').value.trim()||'Sin nombre';
    for(let i=idx1;i<=idx2;i++){
        const c=document.querySelector(`.slot[data-fecha="${fecha}"][data-hora="${HORAS[i]}"]`);
        if(c){
            c.classList.remove('avail','inicio'); c.classList.add('selected');
            c.innerHTML=i===idx1
                ?`<span class="t-nombre">🟢 ${nombre}</span><span class="t-hora">${slotInicio.hora}–${horaFinReal}</span>`
                :`<span style="font-size:.76em;opacity:.85">${nombre}</span>`;
        }
    }
    setInfo(`✅ "${nombre}" — ${fecha} ${slotInicio.hora}–${horaFinReal}. Presione "Reservar selección".`);
    document.getElementById('instruccion').innerHTML=`✅ <strong>${slotInicio.hora}–${horaFinReal}</strong>. Presione <strong>"Reservar selección"</strong>.`;
    document.getElementById('btnReservar').disabled=false;
    document.getElementById('btnCancelarSel').style.display='';
}

function limpiarMarcas(){
    document.querySelectorAll('.slot.selected,.slot.inicio').forEach(el=>{
        el.classList.remove('selected','inicio');
        el.classList.add('avail');
        el.innerHTML='';
    });
}
function cancelarSeleccion(){
    limpiarMarcas();
    slotInicio=null; slotFin=null;
    document.getElementById('btnReservar').disabled=true;
    document.getElementById('btnCancelarSel').style.display='none';
    document.getElementById('instruccion').innerHTML='👉 <strong>Paso 1:</strong> Escriba el nombre y haga clic en <strong>inicio</strong>. Luego <strong>Paso 2:</strong> clic en <strong>fin</strong>.';
    setInfo('Selección cancelada.');
}

async function guardarReserva(){
    if(!slotInicio||!slotFin) return;
    const nombre=document.getElementById('nombreReserva').value.trim()||'Sin nombre';
    const horaFinReal=sumarMinutos(slotFin.hora,INTERVALO);
    const btn=document.getElementById('btnReservar');
    btn.innerHTML='<span class="spinner"></span>Guardando…'; btn.disabled=true;
    try{
        const res=await apiCall({action:'crear',nombre,fecha:slotInicio.fecha,horaInicio:slotInicio.hora,horaFin:horaFinReal});
        if(!res.success) throw new Error(res.error);
        alert('✅ Reserva guardada.');
        slotInicio=null; slotFin=null;
        document.getElementById('nombreReserva').value='';
        document.getElementById('btnCancelarSel').style.display='none';
        document.getElementById('instruccion').innerHTML='👉 <strong>Paso 1:</strong> Escriba el nombre y haga clic en <strong>inicio</strong>. Luego <strong>Paso 2:</strong> clic en <strong>fin</strong>.';
        await cargarReservas();
    }catch(e){
        alert('❌ Error al guardar: '+e.message);
        btn.disabled=false;
    }finally{btn.innerHTML='✅ Reservar selección';}
}

/* ---- Modal editar ---- */
function actualizarResumen(){
    const ni=document.getElementById('editHoraInicio').value;
    const nf=document.getElementById('editHoraFin').value;
    const nd=document.getElementById('editFecha').value;
    const nm=document.getElementById('editNombre').value;
    const r=document.getElementById('editResumen');
    if(ni&&nf&&nd){r.style.display='block';r.innerHTML=`📌 <strong>${nm||'Sin nombre'}</strong> — ${nd} ${ni}–${nf}`;}
}
['editHoraInicio','editHoraFin','editFecha','editNombre'].forEach(id=>
    document.getElementById(id).addEventListener('input',actualizarResumen));

function abrirModal(id){
    const r=reservas.find(x=>x.id==id); if(!r) return;
    reservaEnEdicion=r;
    document.getElementById('editNombre').value=r.nombre;
    document.getElementById('editFecha').value=r.fecha;
    document.getElementById('editHoraInicio').value=r.horaInicio;
    document.getElementById('editHoraFin').value=r.horaFin;
    actualizarResumen();
    document.getElementById('editModal').style.display='block';
}
function cerrarModal(){
    document.getElementById('editModal').style.display='none';
    document.getElementById('editResumen').style.display='none';
    reservaEnEdicion=null; document.getElementById('editForm').reset();
}
async function guardarEdicion(){
    if(!reservaEnEdicion) return;
    const nombre=document.getElementById('editNombre').value.trim();
    const fecha=document.getElementById('editFecha').value;
    const horaInicio=document.getElementById('editHoraInicio').value;
    const horaFin=document.getElementById('editHoraFin').value;
    if(!nombre||!fecha||!horaInicio||!horaFin){alert('Complete todos los campos');return;}
    if(horaFin<=horaInicio){alert('La hora fin debe ser posterior al inicio.');return;}
    const btn=document.getElementById('btnGuardarEdicion');
    btn.innerHTML='<span class="spinner"></span>Guardando…'; btn.disabled=true;
    try{
        const res=await apiCall({action:'editar',id:reservaEnEdicion.id,nombre,fecha,horaInicio,horaFin});
        if(!res.success) throw new Error(res.error);
        alert('✅ Reserva actualizada.'); cerrarModal(); await cargarReservas();
    }catch(e){alert('❌ Error: '+e.message);}
    finally{btn.innerHTML='💾 Guardar cambios';btn.disabled=false;}
}
async function eliminarReserva(){
    if(!reservaEnEdicion) return;
    if(!confirm(`¿Eliminar "${reservaEnEdicion.nombre}"?`)) return;
    const btn=document.getElementById('btnEliminar');
    btn.innerHTML='<span class="spinner"></span>Eliminando…'; btn.disabled=true;
    try{
        const res=await apiCall({action:'eliminar',id:reservaEnEdicion.id});
        if(!res.success) throw new Error(res.error);
        alert('✅ Eliminada.'); cerrarModal(); await cargarReservas();
    }catch(e){alert('❌ Error: '+e.message);}
    finally{btn.innerHTML='🗑️ Eliminar';btn.disabled=false;}
}

/* ---- Eventos ---- */
document.getElementById('btnVerCal').addEventListener('click',()=>{
    const fecha=document.getElementById('semanaInput').value;
    if(!fecha){alert('Seleccione una fecha');return;}
    cancelarSeleccion(); cargarReservas();
});
document.getElementById('btnReservar').addEventListener('click',guardarReserva);
document.getElementById('btnCancelarSel').addEventListener('click',cancelarSeleccion);
document.getElementById('editForm').addEventListener('submit',e=>{e.preventDefault();guardarEdicion();});
document.getElementById('btnEliminar').addEventListener('click',eliminarReserva);
document.getElementById('closeModal').addEventListener('click',cerrarModal);
document.getElementById('cancelEdit').addEventListener('click',cerrarModal);
window.addEventListener('click',e=>{if(e.target===document.getElementById('editModal'))cerrarModal();});

/* ---- Init ---- */
const hoy=new Date().toISOString().split('T')[0];
document.getElementById('semanaInput').min=hoy;
document.getElementById('semanaInput').value=hoy;
cargarReservas();
</script>
</body>
</html>
