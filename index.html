<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reserva de Oficina - Edición incluida</title>
<style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f5f5f5;margin:20px;}
    h1{color:#2c3e50;text-align:center;}
    .container{max-width:960px;margin:auto;background:#fff;padding:20px;
               border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);}
    .controls{margin-bottom:15px;text-align:center;}
    label{display:block;margin-top:8px;font-weight:bold;}
    input,select{width:100%;padding:8px;margin-top:4px;border:1px solid #ccc;
                 border-radius:4px;}
    button{margin:5px;padding:10px 18px;background:#27ae60;color:#fff;
           border:none;border-radius:4px;cursor:pointer;}
    button:hover{background:#2ecc71;}
    button.secondary{background:#95a5a6;}
    button.secondary:hover{background:#bdc3c7;}
    button.danger{background:#e74c3c;}
    button.danger:hover{background:#c0392b;}
    #calendar{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;}
    .time-header,.day-header{background:#ecf0f1;font-weight:bold;
                             text-align:center;padding:6px 0;border-radius:4px;}
    .slot{height:30px;line-height:30px;padding:0 4px;font-size:.9em;
          cursor:pointer;border-radius:3px;user-select:none;}
    .slot.avail{background:#e8f8f5;}
    .slot.selected{background:#2ecc71;color:#fff;}
    .slot.taken{background:#fadbd8;color:#c0392b;cursor:not-allowed;}
    .slot-taken-details{font-size:0.8em;text-align:center;padding:2px;}
    #info{margin-top:15px;padding:10px;background:#f9f9f9;border-left:4px solid #27ae60;
          min-height:40px;}
    /* Modal styles */
    .modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;
           overflow:auto;background-color:rgba(0,0,0,0.4);}
    .modal-content{background-color:#fefefe;margin:15% auto;padding:20px;border:1px solid #888;
                   width:80%;max-width:400px;position:relative;}
    .close{color:#aaa;float:right;font-size:28px;font-weight:bold;}
    .close:hover,.close:focus{color:#000;text-decoration:none;cursor:pointer;}
    .modal-header{border-bottom:1px solid #eee;padding-bottom:10px;margin-bottom:20px;}
    .modal-title{margin:0;font-size:1.5em;}
    .form-group{margin-bottom:15px;}
    label{display:block;margin-bottom:5px;font-weight:bold;}
    input,select{width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;}
</style>
</head>
<body>

<div class="container">
    <h1>Reserva de Oficina de Reuniones</h1>

    <div class="controls">
        <label>Fecha de la semana:
            <input type="date" id="semanaInput">
        </label>
        <label>Nombre / Asunto de la reserva:
            <input type="text" id="nombreReserva" placeholder="Ej. Reunión de proyecto">
        </label>
        <button id="btnVerCal">Mostrar calendario</button>
        <button id="btnReservar" class="secondary" disabled>Reservar</button>
    </div>

    <div id="calendar"></div>
    <div id="info">Cargando reservas existentes...</div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span class="close">&times;</span>
            <h2 class="modal-title">Editar Reserva</h2>
        </div>
        <div class="modal-body">
            <form id="editForm">
                <div class="form-group">
                    <label for="editNombre">Nombre / Asunto:</label>
                    <input type="text" id="editNombre" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="editFecha">Fecha:</label>
                    <input type="date" id="editFecha" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="editHoraInicio">Hora de inicio:</label>
                    <input type="time" id="editHoraInicio" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="editHoraFin">Hora de fin:</label>
                    <input type="time" id="editHoraFin" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                <button type="button" class="btn btn-secondary" id="cancelEdit">Cancelar</button>
            </form>
        </div>
    </div>
</div>

<script>
/* ---------- CONFIG ---------- */
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxjwAjmTVwteVHYZFyQgternZ8NQwv04ktLSz91WJTsMnU3VU_oen0m5nacS0qzNoUVUQ/exec';

const DIAS = ['Lun','Mar','Mié','Jue','Vie'];
const HORA_INI = 8;
const HORA_FIN = 17;
const INTERVALO = 30;
/* --------------------------- */

let reservas = [];
let reservaEnEdicion = null;
let seleccionada = null;

/* ---------- UTILIDADES ---------- */
function pad(n){return n<10?'0'+n:n;}
function generarHoras(){
    const out=[];
    for(let h=HORA_INI;h<=HORA_FIN;h++){
        for(let m=0;m<60;m+=INTERVALO){
            out.push(`${pad(h)}:${pad(m)}`);
        }
    }
    return out;
}
const HORAS = generarHoras();

function esSlotOcupado(fechaISO, hora, excluirId=null){
    const inicioSlot = new Date(`${fechaISO}T${hora}:00`);
    return reservas.some(r=>{
        if (excluirId !== null && r.id === excluirId) return false;
        const ini = new Date(`${r.fecha}T${r.horaInicio}:00`);
        const fin = new Date(`${r.fecha}T${r.horaFin}:00`);
        return inicioSlot>=ini && inicioSlot<fin;
    });
}

/* ---------- CALENDARIO ---------- */
function renderCalendario(fechaISO){
    const cont = document.getElementById('calendar');
    cont.innerHTML='';

    const horaHead = document.createElement('div');
    horaHead.className='time-header';
    horaHead.textContent='Hora\\Día';
    cont.appendChild(horaHead);

    const fechaBase = new Date(fechaISO + 'T12:00:00');
    const diaSemana = fechaBase.getDay();
    const inicioSemana = new Date(fechaBase);
    inicioSemana.setDate(fechaBase.getDate() - ((diaSemana+6)%7));

    DIAS.forEach((dia,idx)=>{
        const diaHead = document.createElement('div');
        diaHead.className='day-header';
        const fechaDia = new Date(inicioSemana);
        fechaDia.setDate(inicioSemana.getDate()+idx);
        diaHead.textContent = `${dia} ${fechaDia.getDate()}/${fechaDia.getMonth()+1}`;
        cont.appendChild(diaHead);
    });

    HORAS.forEach(hora=>{
        const celdaHora = document.createElement('div');
        celdaHora.className='time-header';
        celdaHora.textContent = hora;
        cont.appendChild(celdaHora);

        DIAS.forEach((_,idxDia)=>{
            const celda = document.createElement('div');
            const fechaDia = new Date(inicioSemana);
            fechaDia.setDate(inicioSemana.getDate()+idxDia);
            const fechaStr = `${fechaDia.getFullYear()}-${pad(fechaDia.getMonth()+1)}-${pad(fechaDia.getDate())}`;
            const fechaHora = `${fechaStr}T${hora}:00`;

            const reservaExistente = reservas.find(r=> {
                const reservaInicio = new Date(`${r.fecha}T${r.horaInicio}:00`);
                const reservaFin = new Date(`${r.fecha}T${r.horaFin}:00`);
                const slotInicio = new Date(fechaHora);
                return slotInicio>=reservaInicio && slotInicio<reservaFin;
            });

            if(reservaExistente){
                celda.className='slot taken';
                celda.title=`${reservaExistente.nombre}\n${reservaExistente.fecha} ${reservaExistente.horaInicio}-${reservaExistente.horaFin}`;
                celda.dataset.reservaId = reservaExistente.id;
                celda.innerHTML = `<div class="slot-taken-details">${reservaExistente.nombre}<br>${reservaExistente.horaInicio}-${reservaExistente.horaFin}</div>`;
            }else{
                celda.className='slot avail';
                celda.title='Haga clic para seleccionar';
                celda.onclick = ()=>seleccionarSlot(celda, fechaStr, hora);
            }
            cont.appendChild(celda);
        });
    });
}

/* ---------- SELECCIÓN DE SLOT ---------- */
function seleccionarSlot(elemento, fechaStr, hora){
    document.querySelectorAll('.slot.selected').forEach(el=>el.classList.remove('selected'));
    const finISO = sumarMinutos(hora, INTERVALO);
    seleccionada = {
        fecha: fechaStr,
        horaInicio: hora,
        horaFin: finISO,
        nombre: document.getElementById('nombreReserva').value.trim() || 'Sin nombre'
    };
    elemento.classList.add('selected');
    document.getElementById('info').textContent =
        `Seleccionado: ${seleccionada.nombre} – ${seleccionada.fecha} ${seleccionada.horaInicio} – ${seleccionada.horaFin}`;
    document.getElementById('btnReservar').disabled = false;
}

/* ---------- UTILIDAD DE TIEMPO ---------- */
function sumarMinutos(hhmm, minutos){
    const [h,m]=hhmm.split(':').map(Number);
    let total = h*60 + m + minutos;
    total = ((total% (24*60)) + (24*60))%(24*60);
    return `${pad(Math.floor(total/60))}:${pad(total%60)}`;
}

/* ---------- GUARDAR NUEVA RESERVA ---------- */
function guardarReserva(){
    if(!seleccionada) return;

    const yaExiste = reservas.some(r=>
        r.fecha === seleccionada.fecha &&
        r.horaInicio === seleccionada.horaInicio
    );

    if(yaExiste){ alert('Este horario ya está reservado'); return; }

    fetch(WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(seleccionada)
    })
    .then(r=>r.json())
    .then(result => {
        if (result.success) {
            alert('Reserva guardada exitosamente.');
            cargarReservas();
            document.getElementById('btnReservar').disabled = true;
            document.getElementById('nombreReserva').value = '';
            seleccionada = null;
        } else { throw new Error(result.error); }
    })
    .catch(e=>{ alert('Error al guardar: ' + e.message); });
}

/* ---------- EDITAR RESERVA ---------- */
function abrirModalEditar(reservaId){
    const reserva = reservas.find(r=> r.id == reservaId);
    if(!reserva){ alert('Reserva no encontrada'); return; }
    reservaEnEdicion = reserva;
    document.getElementById('editNombre').value = reserva.nombre;
    document.getElementById('editFecha').value = reserva.fecha;
    document.getElementById('editHoraInicio').value = reserva.horaInicio;
    document.getElementById('editHoraFin').value = reserva.horaFin;
    document.getElementById('editModal').style.display = 'block';
}

function cerrarModalEditar(){
    document.getElementById('editModal').style.display = 'none';
    reservaEnEdicion = null;
    document.getElementById('editForm').reset();
}

function guardarCambiosEdicion(){
    if(!reservaEnEdicion) return;
    const nombre = document.getElementById('editNombre').value.trim();
    const fecha = document.getElementById('editFecha').value;
    const horaInicio = document.getElementById('editHoraInicio').value;
    const horaFin = document.getElementById('editHoraFin').value;
    if(!nombre||!fecha||!horaInicio||!horaFin){ alert('Complete todos los campos'); return; }

    fetch(WEB_APP_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: reservaEnEdicion.id, nombre, fecha, horaInicio, horaFin })
    })
    .then(r=>r.json())
    .then(result => {
        if (result.success) {
            alert('Reserva actualizada.');
            cerrarModalEditar();
            cargarReservas();
        } else { throw new Error(result.error); }
    })
    .catch(e=>{ alert('Error al actualizar: ' + e.message); });
}

/* ---------- CARGAR RESERVAS ---------- */
function cargarReservas(){
    document.getElementById('info').textContent = 'Cargando reservas...';
    fetch(WEB_APP_URL)
        .then(r=>{ if(!r.ok) throw new Error(`Error ${r.status}`); return r.json(); })
        .then(data => {
            reservas = data;
            const fecha = document.getElementById('semanaInput').value;
            if(fecha) renderCalendario(fecha);
            document.getElementById('info').textContent =
                `${reservas.length} reservas encontradas. Seleccione un horario para reservar o haga clic en uno ocupado para editarlo.`;
        })
        .catch(e=>{
            document.getElementById('info').textContent = 'Error al cargar reservas: ' + e.message;
        });
}

/* ---------- EVENTOS ---------- */
document.getElementById('btnVerCal').addEventListener('click', ()=>{
    const fecha = document.getElementById('semanaInput').value;
    if(!fecha){ alert('Seleccione una fecha'); return; }
    cargarReservas();
});

document.getElementById('btnReservar').addEventListener('click', guardarReserva);
document.getElementsByClassName('close')[0].addEventListener('click', cerrarModalEditar);
document.getElementById('cancelEdit').addEventListener('click', cerrarModalEditar);
window.addEventListener('click', e=>{ if(e.target===document.getElementById('editModal')) cerrarModalEditar(); });
document.getElementById('editForm').addEventListener('submit', e=>{ e.preventDefault(); guardarCambiosEdicion(); });

document.addEventListener('click', e=>{
    const slot = e.target.closest('.slot.taken');
    if(slot){
        const id = slot.dataset.reservaId;
        if(id) abrirModalEditar(id);
    }
});

/* ---------- INICIALIZAR ---------- */
const hoy = new Date().toISOString().split('T')[0];
document.getElementById('semanaInput').min = hoy;
document.getElementById('semanaInput').value = hoy;
</script>
</body>
</html>
