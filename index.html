<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reserva de Sala de Reuniones</title>
<style>
    *{box-sizing:border-box;}
    body{font-family:Arial,Helvetica,sans-serif;background:#f0f4f8;margin:0;padding:16px;}
    h1{color:#2c3e50;text-align:center;margin-bottom:16px;font-size:1.4em;}
    .container{max-width:1000px;margin:auto;background:#fff;padding:20px;
               border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.12);}
    .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:12px;}
    .ctrl-group{display:flex;flex-direction:column;flex:1;min-width:160px;}
    .ctrl-group label{font-weight:bold;margin-bottom:4px;font-size:.88em;color:#555;}
    input[type=date],input[type=text]{
        padding:8px 10px;border:1px solid #ccc;border-radius:6px;width:100%;font-size:.93em;}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
    button{
        padding:9px 16px;border:none;border-radius:6px;cursor:pointer;
        font-size:.88em;font-weight:bold;transition:opacity .2s;}
    button:hover{opacity:.85;}
    button.verde{background:#27ae60;color:#fff;}
    button.gris{background:#95a5a6;color:#fff;}
    button.rojo{background:#e74c3c;color:#fff;}
    button:disabled{opacity:.5;cursor:not-allowed;}

    /* ===== CALENDARIO ===== */
    #calendar{
        display:grid;
        grid-template-columns:64px repeat(5,1fr);
        gap:3px;
        margin-top:8px;
    }
    .time-header{
        background:#dfe6e9;font-size:.78em;font-weight:bold;
        text-align:center;padding:6px 2px;border-radius:5px;color:#636e72;
        display:flex;align-items:center;justify-content:center;
    }
    .day-header{
        background:#2c3e50;color:#fff;font-size:.82em;font-weight:bold;
        text-align:center;padding:8px 2px;border-radius:5px;
        display:flex;align-items:center;justify-content:center;
    }

    /* slots base */
    .slot{
        min-height:38px;padding:3px 4px;border-radius:5px;
        cursor:pointer;user-select:none;
        display:flex;align-items:center;justify-content:center;
        text-align:center;font-size:.76em;line-height:1.25;
        transition:filter .15s;
    }
    .slot:hover{filter:brightness(.92);}

    /* LIBRE */
    .slot.avail{
        background:#eafaf1;
        border:1px solid #a9dfbf;
        color:#27ae60;
    }

    /* INICIO seleccionado (naranja) */
    .slot.inicio{
        background:#e67e22;
        border:2px solid #d35400;
        color:#fff;
        font-weight:bold;
    }

    /* RANGO seleccionado (verde fuerte) */
    .slot.selected{
        background:#27ae60;
        border:2px solid #1e8449;
        color:#fff;
        font-weight:bold;
    }

    /* OCUPADO (rojo con nombre) */
    .slot.taken{
        background:#e74c3c;
        border:1px solid #c0392b;
        color:#fff;
        cursor:pointer;
        flex-direction:column;
        gap:1px;
    }
    .slot.taken .nombre-reserva{
        font-weight:bold;
        font-size:.82em;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        max-width:100%;
    }
    .slot.taken .hora-reserva{
        font-size:.72em;
        opacity:.9;
    }
    /* primer slot del bloque muestra nombre, los siguientes solo color */
    .slot.taken.continuacion{
        background:#c0392b;
        justify-content:center;
        font-size:.7em;
        opacity:.85;
    }

    #instruccion{
        background:#eaf4fb;border-left:4px solid #3498db;
        padding:8px 14px;margin:8px 0;border-radius:6px;
        font-size:.88em;color:#2c3e50;
    }
    #info{
        margin-top:12px;padding:10px 14px;
        background:#f8f9fa;border-left:4px solid #27ae60;
        border-radius:6px;font-size:.9em;min-height:36px;color:#2d3436;
    }
    .modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;
           overflow:auto;background:rgba(0,0,0,.5);}
    .modal-content{background:#fff;margin:8% auto;padding:26px;border-radius:10px;
                   width:93%;max-width:420px;}
    .modal-title{margin:0 0 18px;font-size:1.15em;color:#2c3e50;}
    .close{color:#aaa;float:right;font-size:26px;font-weight:bold;cursor:pointer;line-height:1;}
    .close:hover{color:#000;}
    .form-group{margin-bottom:12px;}
    .form-group label{display:block;margin-bottom:4px;font-size:.88em;font-weight:bold;color:#555;}
    .form-group input{width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;font-size:.93em;}
    .modal-btns{display:flex;gap:8px;margin-top:16px;}
    .modal-btns button{flex:1;padding:10px;}
    .spinner{display:inline-block;width:13px;height:13px;border:2px solid #fff;
             border-top-color:transparent;border-radius:50%;
             animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px;}
    @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="container">
    <h1>📅 Reserva de Sala de Reuniones</h1>

    <div class="controls">
        <div class="ctrl-group">
            <label for="semanaInput">Semana:</label>
            <input type="date" id="semanaInput">
        </div>
        <div class="ctrl-group">
            <label for="nombreReserva">Nombre / Asunto:</label>
            <input type="text" id="nombreReserva" placeholder="Ej. Reunión de proyecto">
        </div>
        <div style="display:flex;gap:6px;align-items:flex-end;padding-bottom:1px;">
            <button class="verde" id="btnVerCal">🔄 Cambiar semana</button>
        </div>
    </div>

    <div class="btn-row">
        <button class="verde" id="btnReservar" disabled>✅ Reservar selección</button>
        <button class="gris" id="btnCancelarSel" style="display:none">❌ Cancelar selección</button>
    </div>

    <div id="instruccion">
        👉 <strong>Paso 1:</strong> Escriba el nombre/asunto y haga clic en el horario de <strong>inicio</strong> (se marca en 🟠 naranja).
        Luego <strong>Paso 2:</strong> Haga clic en el horario de <strong>fin</strong> (el rango se marca en 🟢 verde).
    </div>

    <div id="calendar"></div>
    <div id="info">Cargando calendario...</div>
</div>

<!-- Modal Editar -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModal">&times;</span>
        <h2 class="modal-title">✏️ Editar Reserva</h2>
        <form id="editForm">
            <div class="form-group">
                <label>Nombre / Asunto:</label>
                <input type="text" id="editNombre" required>
            </div>
            <div class="form-group">
                <label>Fecha:</label>
                <input type="date" id="editFecha" required>
            </div>
            <div class="form-group">
                <label>Hora inicio:</label>
                <input type="time" id="editHoraInicio" required>
            </div>
            <div class="form-group">
                <label>Hora fin:</label>
                <input type="time" id="editHoraFin" required>
            </div>
            <div class="modal-btns">
                <button type="submit" class="verde" id="btnGuardarEdicion">💾 Guardar</button>
                <button type="button" class="rojo" id="btnEliminar">🗑️ Eliminar</button>
                <button type="button" class="gris" id="cancelEdit">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script>
const WEB_APP_URL='https://script.google.com/macros/s/AKfycbxw-ft1VZ4H-udfqkzNQTlmUhdQqd2c5COP2O_HfPwwryo6HieEzPUM2II1JBJiNUg/exec';
const DIAS=['Lun','Mar','Mié','Jue','Vie'];
const HORA_INI=8, HORA_FIN=17, INTERVALO=30;

let reservas=[], reservaEnEdicion=null;
let slotInicio=null, slotFin=null;

function pad(n){return n<10?'0'+n:n;}
function sumarMinutos(hhmm,mins){
    const [h,m]=hhmm.split(':').map(Number);
    let t=((h*60+m+mins)%1440+1440)%1440;
    return `${pad(Math.floor(t/60))}:${pad(t%60)}`;
}
function generarHoras(){
    const out=[];
    for(let h=HORA_INI;h<=HORA_FIN;h++)
        for(let m=0;m<60;m+=INTERVALO)
            out.push(`${pad(h)}:${pad(m)}`);
    return out;
}
const HORAS=generarHoras();
function setInfo(msg){document.getElementById('info').textContent=msg;}

async function apiCall(params){
    const r=await fetch(WEB_APP_URL+'?'+new URLSearchParams(params));
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
}

async function cargarReservas(){
    setInfo('⏳ Cargando reservas...');
    try{
        reservas=await apiCall({action:'listar'});
        renderCalendario(document.getElementById('semanaInput').value);
        setInfo(`${reservas.length} reserva(s) en el sistema. Ingrese nombre y seleccione inicio → fin para reservar.`);
    }catch(e){setInfo('❌ Error al cargar: '+e.message);}
}

function reservaDelSlot(fs,hora){
    return reservas.find(r=>{
        const ini=new Date(`${r.fecha}T${r.horaInicio}:00`);
        const fin=new Date(`${r.fecha}T${r.horaFin}:00`);
        const slot=new Date(`${fs}T${hora}:00`);
        return slot>=ini && slot<fin;
    });
}

function esInicioDeReserva(r,fs,hora){
    return r.fecha===fs && r.horaInicio===hora;
}

function renderCalendario(fechaISO){
    const cont=document.getElementById('calendar');
    cont.innerHTML='';

    // cabecera hora
    const h0=document.createElement('div');
    h0.className='time-header'; h0.textContent='Hora';
    cont.appendChild(h0);

    const base=new Date(fechaISO+'T12:00:00');
    const lunes=new Date(base);
    lunes.setDate(base.getDate()-((base.getDay()+6)%7));

    // cabeceras días
    DIAS.forEach((dia,i)=>{
        const d=new Date(lunes); d.setDate(lunes.getDate()+i);
        const th=document.createElement('div');
        th.className='day-header';
        th.textContent=`${dia} ${d.getDate()}/${d.getMonth()+1}`;
        cont.appendChild(th);
    });

    // slots
    HORAS.forEach(hora=>{
        const ch=document.createElement('div');
        ch.className='time-header'; ch.textContent=hora;
        cont.appendChild(ch);

        DIAS.forEach((_,i)=>{
            const d=new Date(lunes); d.setDate(lunes.getDate()+i);
            const fs=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
            const rx=reservaDelSlot(fs,hora);
            const celda=document.createElement('div');
            celda.dataset.fecha=fs;
            celda.dataset.hora=hora;

            if(rx){
                const esInicio=esInicioDeReserva(rx,fs,hora);
                celda.className=esInicio ? 'slot taken' : 'slot taken continuacion';
                celda.title=`${rx.nombre} (${rx.horaInicio}–${rx.horaFin}) — Clic para editar`;
                if(esInicio){
                    celda.innerHTML=`
                        <span class="nombre-reserva">${rx.nombre}</span>
                        <span class="hora-reserva">${rx.horaInicio}–${rx.horaFin}</span>`;
                } else {
                    celda.innerHTML=`<span style="font-size:.7em;opacity:.7">${rx.nombre}</span>`;
                }
                celda.addEventListener('click',()=>abrirModal(rx.id));
            }else{
                celda.className='slot avail';
                celda.addEventListener('click',()=>clicSlotLibre(celda,fs,hora));
            }
            cont.appendChild(celda);
        });
    });
}

/* ---- Selección de rango ---- */
function clicSlotLibre(elem,fecha,hora){
    if(!slotInicio){
        slotInicio={fecha,hora};
        elem.classList.remove('avail');
        elem.classList.add('inicio');
        elem.textContent='🟠 Inicio';
        setInfo(`⏱️ Inicio marcado: ${fecha} ${hora}. Ahora haga clic en el horario de FIN.`);
        document.getElementById('instruccion').innerHTML=
            '👉 <strong>Paso 2:</strong> Haga clic en el horario de <strong>fin</strong> de la reserva.';
        return;
    }
    if(fecha!==slotInicio.fecha){alert('Inicio y fin deben ser el mismo día.');return;}
    if(hora<slotInicio.hora){alert('La hora de fin no puede ser anterior al inicio.');return;}

    slotFin={fecha,hora};
    const horaFinReal=sumarMinutos(hora,INTERVALO);
    const idx1=HORAS.indexOf(slotInicio.hora);
    const idx2=HORAS.indexOf(hora);

    // Verificar rango libre
    for(let i=idx1;i<=idx2;i++){
        if(reservaDelSlot(fecha,HORAS[i])){
            alert(`El slot ${HORAS[i]} está ocupado. Elija un rango completamente libre.`);
            cancelarSeleccion(); return;
        }
    }

    // Pintar rango
    limpiarMarcas();
    const nombre=document.getElementById('nombreReserva').value.trim()||'Sin nombre';
    for(let i=idx1;i<=idx2;i++){
        const celda=document.querySelector(`.slot[data-fecha="${fecha}"][data-hora="${HORAS[i]}"]`);
        if(celda){
            celda.classList.remove('avail','inicio');
            celda.classList.add('selected');
            celda.textContent = i===idx1
                ? `🟢 ${nombre}\n${slotInicio.hora}–${horaFinReal}`
                : '┃';
        }
    }
    setInfo(`✅ "${nombre}" — ${fecha} ${slotInicio.hora}–${horaFinReal}. Presione "Reservar selección" para confirmar.`);
    document.getElementById('instruccion').innerHTML=
        `✅ Rango seleccionado: <strong>${slotInicio.hora} – ${horaFinReal}</strong>. Presione <strong>"Reservar selección"</strong> para confirmar.`;
    document.getElementById('btnReservar').disabled=false;
    document.getElementById('btnCancelarSel').style.display='';
}

function limpiarMarcas(){
    document.querySelectorAll('.slot.selected,.slot.inicio').forEach(el=>{
        el.classList.remove('selected','inicio');
        el.classList.add('avail');
        el.textContent='';
    });
}

function cancelarSeleccion(){
    limpiarMarcas();
    slotInicio=null; slotFin=null;
    document.getElementById('btnReservar').disabled=true;
    document.getElementById('btnCancelarSel').style.display='none';
    document.getElementById('instruccion').innerHTML=
        '👉 <strong>Paso 1:</strong> Escriba el nombre/asunto y haga clic en el horario de <strong>inicio</strong>. Luego <strong>Paso 2:</strong> Haga clic en el horario de <strong>fin</strong>.';
    setInfo('Selección cancelada.');
}

async function guardarReserva(){
    if(!slotInicio||!slotFin) return;
    const nombre=document.getElementById('nombreReserva').value.trim()||'Sin nombre';
    const horaFinReal=sumarMinutos(slotFin.hora,INTERVALO);
    const btn=document.getElementById('btnReservar');
    btn.innerHTML='<span class="spinner"></span>Guardando…'; btn.disabled=true;
    try{
        const res=await apiCall({action:'crear',nombre,fecha:slotInicio.fecha,horaInicio:slotInicio.hora,horaFin:horaFinReal});
        if(!res.success) throw new Error(res.error);
        alert('✅ Reserva guardada.');
        slotInicio=null; slotFin=null;
        document.getElementById('nombreReserva').value='';
        document.getElementById('btnCancelarSel').style.display='none';
        document.getElementById('instruccion').innerHTML=
            '👉 <strong>Paso 1:</strong> Escriba el nombre/asunto y haga clic en el horario de <strong>inicio</strong>. Luego <strong>Paso 2:</strong> Haga clic en el horario de <strong>fin</strong>.';
        await cargarReservas();
    }catch(e){
        alert('❌ Error al guardar: '+e.message);
        btn.disabled=false;
    }finally{btn.innerHTML='✅ Reservar selección';}
}

/* ---- Modal ---- */
function abrirModal(id){
    const r=reservas.find(x=>x.id==id); if(!r) return;
    reservaEnEdicion=r;
    document.getElementById('editNombre').value=r.nombre;
    document.getElementById('editFecha').value=r.fecha;
    document.getElementById('editHoraInicio').value=r.horaInicio;
    document.getElementById('editHoraFin').value=r.horaFin;
    document.getElementById('editModal').style.display='block';
}
function cerrarModal(){
    document.getElementById('editModal').style.display='none';
    reservaEnEdicion=null;
    document.getElementById('editForm').reset();
}
async function guardarEdicion(){
    if(!reservaEnEdicion) return;
    const nombre=document.getElementById('editNombre').value.trim();
    const fecha=document.getElementById('editFecha').value;
    const horaInicio=document.getElementById('editHoraInicio').value;
    const horaFin=document.getElementById('editHoraFin').value;
    if(!nombre||!fecha||!horaInicio||!horaFin){alert('Complete todos los campos');return;}
    const btn=document.getElementById('btnGuardarEdicion');
    btn.innerHTML='<span class="spinner"></span>Guardando…'; btn.disabled=true;
    try{
        const res=await apiCall({action:'editar',id:reservaEnEdicion.id,nombre,fecha,horaInicio,horaFin});
        if(!res.success) throw new Error(res.error);
        alert('✅ Actualizada.'); cerrarModal(); await cargarReservas();
    }catch(e){alert('❌ Error: '+e.message);}
    finally{btn.innerHTML='💾 Guardar';btn.disabled=false;}
}
async function eliminarReserva(){
    if(!reservaEnEdicion) return;
    if(!confirm(`¿Eliminar "${reservaEnEdicion.nombre}"?`)) return;
    const btn=document.getElementById('btnEliminar');
    btn.innerHTML='<span class="spinner"></span>Eliminando…'; btn.disabled=true;
    try{
        const res=await apiCall({action:'eliminar',id:reservaEnEdicion.id});
        if(!res.success) throw new Error(res.error);
        alert('✅ Eliminada.'); cerrarModal(); await cargarReservas();
    }catch(e){alert('❌ Error: '+e.message);}
    finally{btn.innerHTML='🗑️ Eliminar';btn.disabled=false;}
}

/* ---- Eventos ---- */
document.getElementById('btnVerCal').addEventListener('click',()=>{
    const fecha=document.getElementById('semanaInput').value;
    if(!fecha){alert('Seleccione una fecha');return;}
    cancelarSeleccion(); cargarReservas();
});
document.getElementById('btnReservar').addEventListener('click',guardarReserva);
document.getElementById('btnCancelarSel').addEventListener('click',cancelarSeleccion);
document.getElementById('editForm').addEventListener('submit',e=>{e.preventDefault();guardarEdicion();});
document.getElementById('btnEliminar').addEventListener('click',eliminarReserva);
document.getElementById('closeModal').addEventListener('click',cerrarModal);
document.getElementById('cancelEdit').addEventListener('click',cerrarModal);
window.addEventListener('click',e=>{if(e.target===document.getElementById('editModal'))cerrarModal();});

/* ---- Init ---- */
const hoy=new Date().toISOString().split('T')[0];
document.getElementById('semanaInput').min=hoy;
document.getElementById('semanaInput').value=hoy;
cargarReservas();
</script>
</body>
</html>
